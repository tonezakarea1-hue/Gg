<!doctype html>
<html lang="ku">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spy Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <h1>Find The Spy 🔍</h1>

    <section id="setup" class="card">
      <label>ژمارەی یاریزان</label>
      <input id="pCount" type="number" min="3" max="15" value="4" />

      <label>ژمارەی سیخوڕ</label>
      <input id="sCount" type="number" min="1" max="3" value="1" />

      <label>کات (خولەک)</label>
      <input id="minutes" type="number" min="1" max="20" value="5" />

      <button id="btnStart">Start</button>
      <p id="msg"></p>
    </section>

    <section id="roles" class="card hidden">
      <h2 id="passTitle"></h2>
      <button id="btnReveal">نیشاندانی کارت</button>

      <div id="card" class="hidden">
        <h3 id="roleText"></h3>
        <p id="wordText"></p>
        <button id="btnHide">شاردنەوە</button>
      </div>
    </section>

    <section id="talk" class="card hidden">
      <h2>کاتی قسەکردن</h2>
      <div class="timer" id="timer"></div>
      <button id="btnGoVote">بچۆ بۆ Vote</button>
    </section>

    <section id="vote" class="card hidden">
      <h2>دەنگدان</h2>
      <div id="voteList"></div>
      <button id="btnFinish">ئەنجام</button>
      <pre id="result"></pre>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
